<!doctype html>
<html lang="en" class="h-full">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="description" content="Shift Roster — a modern foundation for managing shift schedules." />
    <title>Shift Roster</title>

    <!-- TailwindCSS via Play CDN (Phase 1) -->
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <script>
      // Configure Tailwind dark mode = 'class' so we can toggle the
      // 'dark' class on <html> manually.
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            fontFamily: {
              sans: [
                "Inter",
                "ui-sans-serif",
                "system-ui",
                "-apple-system",
                "Segoe UI",
                "Roboto",
                "Helvetica Neue",
                "Arial",
                "sans-serif",
              ],
            },
            boxShadow: {
              soft: "0 10px 30px -10px rgb(15 23 42 / 0.15)",
              "soft-dark": "0 10px 30px -10px rgb(0 0 0 / 0.5)",
            },
          },
        },
      };
    </script>

    <!-- Inter font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="/css/styles.css" />
  </head>

  <body
    class="h-full font-sans antialiased bg-slate-50 text-slate-800 transition-colors duration-200 dark:bg-slate-950 dark:text-slate-100"
  >
    <!-- =========================================================
         HEADER
         ========================================================= -->
    <header
      class="sticky top-0 z-30 border-b border-slate-200/70 bg-white/80 backdrop-blur
             dark:border-slate-800/70 dark:bg-slate-900/80"
    >
      <div class="mx-auto flex max-w-6xl items-center justify-between gap-4 px-4 py-3 sm:px-6 lg:px-8">
        <div class="flex items-center gap-3">
          <div
            class="grid h-9 w-9 place-items-center rounded-xl bg-gradient-to-br from-indigo-500 to-violet-600 text-white shadow-soft"
            aria-hidden="true"
          >
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="h-5 w-5">
              <rect x="3" y="4" width="18" height="18" rx="3" />
              <path d="M16 2v4M8 2v4M3 10h18" />
            </svg>
          </div>
          <div class="leading-tight">
            <h1 class="text-base font-semibold sm:text-lg">Shift Roster</h1>
            <p id="current-month" class="text-xs text-slate-500 dark:text-slate-400">—</p>
          </div>
        </div>

        <div class="flex items-center gap-2">
          <!-- Dark mode toggle -->
          <button
            id="theme-toggle"
            type="button"
            aria-label="Toggle dark mode"
            class="inline-flex h-10 w-10 items-center justify-center rounded-xl border border-slate-200 bg-white text-slate-600 shadow-sm transition hover:bg-slate-100
                   dark:border-slate-700 dark:bg-slate-800 dark:text-slate-200 dark:hover:bg-slate-700"
          >
            <!-- Sun icon (visible in dark mode) -->
            <svg
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              class="h-5 w-5 hidden dark:block"
            >
              <circle cx="12" cy="12" r="4" />
              <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41" />
            </svg>
            <!-- Moon icon (visible in light mode) -->
            <svg
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              class="h-5 w-5 dark:hidden"
            >
              <path d="M21 12.79A9 9 0 1 1 11.21 3a7 7 0 0 0 9.79 9.79z" />
            </svg>
          </button>

          <!-- Admin login (non-functional in Phase 1) -->
          <button
            type="button"
            disabled
            aria-disabled="true"
            title="Coming in a future phase"
            class="hidden sm:inline-flex items-center gap-2 rounded-xl bg-slate-900 px-4 py-2 text-sm font-medium text-white shadow-soft transition hover:bg-slate-800 disabled:cursor-not-allowed disabled:opacity-60
                   dark:bg-indigo-500 dark:hover:bg-indigo-400"
          >
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="h-4 w-4">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
              <circle cx="12" cy="7" r="4" />
            </svg>
            Admin Login
          </button>
        </div>
      </div>
    </header>

    <!-- =========================================================
         MAIN
         ========================================================= -->
    <main class="mx-auto max-w-6xl px-4 py-10 sm:px-6 sm:py-14 lg:px-8">
      <section
        class="relative overflow-hidden rounded-3xl border border-slate-200/70 bg-white p-8 shadow-soft transition
               dark:border-slate-800/70 dark:bg-slate-900 sm:p-12"
      >
        <!-- Decorative gradient blob -->
        <div
          class="pointer-events-none absolute -right-24 -top-24 h-64 w-64 rounded-full bg-gradient-to-br from-indigo-300/40 to-violet-300/40 blur-3xl dark:from-indigo-500/20 dark:to-violet-500/20"
          aria-hidden="true"
        ></div>

        <div class="relative">
          <span
            class="inline-flex items-center gap-2 rounded-full border border-indigo-200/60 bg-indigo-50 px-3 py-1 text-xs font-medium text-indigo-700
                   dark:border-indigo-500/30 dark:bg-indigo-500/10 dark:text-indigo-300"
          >
            <span class="h-1.5 w-1.5 rounded-full bg-indigo-500"></span>
            Phase 1 · Foundation ready
          </span>

          <h2 class="mt-5 text-3xl font-bold tracking-tight sm:text-4xl md:text-5xl">
            Shift Roster
          </h2>
          <p class="mt-3 max-w-2xl text-base text-slate-600 dark:text-slate-300 sm:text-lg">
            System is ready.
          </p>

          <!-- Empty placeholder -->
          <div
            class="mt-10 flex min-h-[280px] flex-col items-center justify-center rounded-2xl border-2 border-dashed border-slate-200 bg-slate-50/60 p-10 text-center
                   dark:border-slate-800 dark:bg-slate-900/40"
          >
            <div
              class="mb-4 grid h-14 w-14 place-items-center rounded-2xl bg-white text-slate-400 shadow-sm
                     dark:bg-slate-800 dark:text-slate-500"
              aria-hidden="true"
            >
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" class="h-7 w-7">
                <rect x="3" y="4" width="18" height="18" rx="3" />
                <path d="M16 2v4M8 2v4M3 10h18" />
              </svg>
            </div>
            <p class="text-sm font-medium text-slate-500 dark:text-slate-400">
              Roster will appear here.
            </p>
            <p class="mt-1 text-xs text-slate-400 dark:text-slate-500">
              No employees · No shifts · No grid
            </p>
          </div>

          <!-- System status row -->
          <div class="mt-8 grid grid-cols-1 gap-3 sm:grid-cols-3">
            <div
              class="flex items-center gap-3 rounded-2xl border border-slate-200/70 bg-white/60 p-4
                     dark:border-slate-800/70 dark:bg-slate-900/60"
            >
              <span class="relative flex h-2.5 w-2.5">
                <span class="absolute inline-flex h-full w-full animate-ping rounded-full bg-emerald-400 opacity-60"></span>
                <span class="relative inline-flex h-2.5 w-2.5 rounded-full bg-emerald-500"></span>
              </span>
              <div class="text-sm">
                <p class="font-medium">Backend</p>
                <p id="api-status" class="text-xs text-slate-500 dark:text-slate-400">Checking…</p>
              </div>
            </div>

            <div
              class="flex items-center gap-3 rounded-2xl border border-slate-200/70 bg-white/60 p-4
                     dark:border-slate-800/70 dark:bg-slate-900/60"
            >
              <span class="h-2.5 w-2.5 rounded-full bg-indigo-500"></span>
              <div class="text-sm">
                <p class="font-medium">Database</p>
                <p class="text-xs text-slate-500 dark:text-slate-400">PostgreSQL · Connected</p>
              </div>
            </div>

            <div
              class="flex items-center gap-3 rounded-2xl border border-slate-200/70 bg-white/60 p-4
                     dark:border-slate-800/70 dark:bg-slate-900/60"
            >
              <span class="h-2.5 w-2.5 rounded-full bg-violet-500"></span>
              <div class="text-sm">
                <p class="font-medium">Environment</p>
                <p class="text-xs text-slate-500 dark:text-slate-400">Development</p>
              </div>
            </div>
          </div>
        </div>
      </section>

      <p class="mt-6 text-center text-xs text-slate-400 dark:text-slate-500">
        &copy; <span id="current-year">—</span> Shift Roster · Foundation build
      </p>
    </main>

    <script src="/js/app.js" defer></script>
  </body>
</html>
