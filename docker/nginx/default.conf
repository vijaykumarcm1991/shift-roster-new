server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # --- Security headers ---
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # --- Frontend static files ---
    root /usr/share/nginx/html;
    index pages/index.html;

    # Cache static assets aggressively
    location ~* ^/assets/\.(?:css|js|svg|ico|png|jpg|jpeg|gif|webp|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
        try_files $uri =404;
    }

    # Reverse proxy API requests to the FastAPI backend
    location /api/ {
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # --- Public routes ---
    location = / {
        try_files /pages/index.html =404;
    }

    location = /login {
        try_files /pages/login.html =404;
    }

    location = /roster {
        try_files /pages/public-roster.html =404;
    }

    location = /roster/ {
        try_files /pages/public-roster.html =404;
    }

    # --- Admin routes ---
    location = /admin {
        try_files /pages/admin.html =404;
    }

    location = /admin/ {
        try_files /pages/admin.html =404;
    }

    location = /admin/employees {
        try_files /pages/employees.html =404;
    }

    location = /admin/employees/ {
        try_files /pages/employees.html =404;
    }

    location = /admin/roster {
        try_files /pages/roster.html =404;
    }

    location = /admin/roster/ {
        try_files /pages/roster.html =404;
    }

    location = /admin/settings {
        try_files /pages/settings.html =404;
    }

    location = /admin/settings/ {
        try_files /pages/settings.html =404;
    }

    # Fallback for unknown routes
    location / {
        try_files $uri $uri/ /pages/index.html;
    }

    # Don't allow listing of dotfiles
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
