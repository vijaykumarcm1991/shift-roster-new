services:
  postgres:
    image: postgres:16-alpine
    container_name: shiftroster-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      TZ: ${APP_TIMEZONE}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - shiftroster-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: shiftroster-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
    ports:
      - "8001:8000"
    networks:
      - shiftroster-net
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  nginx:
    build:
      context: ./docker/nginx
      dockerfile: Dockerfile
    container_name: shiftroster-nginx
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "7080:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - shiftroster-net

volumes:
  postgres_data:
    name: shiftroster_postgres_data

networks:
  shiftroster-net:
    name: shiftroster-net
    driver: bridge
